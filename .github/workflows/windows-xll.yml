name: Windows XLL

on:
  push:
  pull_request:

jobs:
  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Check declared MSRV
        run: cargo check --workspace --all-targets --all-features

  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-features
      - name: Core without default macros
        run: cargo test -p excel-api --no-default-features
      - name: Doctests
        run: cargo test --workspace --doc
      - name: Published core Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p excel-api-sys -p excel-api -p excel-api-macros --features macros --no-deps
      - name: ABI checker
        run: cargo run --manifest-path tools/abi-check/Cargo.toml
      - name: Build release XLL
        shell: pwsh
        run: pwsh -File scripts/build-minimal-xll.ps1 -Profile release
      - name: Inspect XLL exports
        shell: pwsh
        run: pwsh -File scripts/inspect-minimal-xll-exports.ps1
      - name: Upload XLL and export report
        uses: actions/upload-artifact@v4
        with:
          name: minimal-xll-windows-x64
          path: |
            target/release/minimal_xll.xll
            target/release/minimal_xll.exports.txt
